    <!--바탕색 바꾸기-->
    <script type = "text/javascript">
    var backcolor = "white";
    function change() {
        var bodytag = document.getElementById("back");
        var contents = document.getElementById("article");
        var Atitle = document.getElementById("article_title");
        var Alogo = document.getElementById("logo");

        if (backcolor=="white") {
            bodytag.style.backgroundColor = "black";
            contents.style.color = "white";
            Atitle.style.color = "#A9D18E";
            Alogo.style.color = "white";
            backcolor = "black";
        }
        else if (backcolor=="black") {
            bodytag.style.backgroundColor = "white";
            backcolor = "white";
            contents.style.color = "black";
            Atitle.style.color = "black";
            Alogo.style.color = "black";
        }
    }
    </script>
    <input style="border: 0; width: 8%; height: 4%; position: absolute; top: 15%; left: 85%" 
    id="button" type="button" value="모드 전환" onclick="change()"/>

    <!--슬라이드쇼 표기바 & 버튼-->
    <input id="bar" type="range" min="0" max="3" value="0" style="border: 0; 
    width: 8%; height: 4%; position: absolute; top: 16.5%; right: 29%;"/> 
    <canvas id="left_tri" width="35" height="50"
    style="position: absolute; bottom: 125px; right: 450px;"></canvas>
    <canvas id="right_tri" width="35" height="50" 
    style="position: absolute; bottom: 125px; right: 510px;"></canvas>
    
    <script type = "text/javascript">
    var Abar = document.getElementById("bar");
    var canvas = document.getElementById("left_tri");
    var canvas2 = document.getElementById("right_tri");
    var context = canvas.getContext("2d");
    var context2 = canvas2.getContext("2d");
    // 우측 화살표
    context.beginPath();
    context.moveTo(15, 10);
    context.lineTo(30, 25);
    context.lineTo(15, 40);
    context.strokeStyle="#A6A6A6";
    context.fillStyle="#A6A6A6";
    context.stroke();
    context.fill();
    // 좌측 화살표
    context2.beginPath();
    context2.moveTo(25, 10);
    context2.lineTo(10, 25);
    context2.lineTo(25, 40);
    context2.strokeStyle="#A6A6A6";
    context2.fillStyle="#A6A6A6";
    context2.stroke();
    context2.fill();

    var pic1 = document.getElementById("pic1");
    var pic2 = document.getElementById("pic2");
    var pic3 = document.getElementById("pic3");
    var pic4 = document.getElementById("pic4");
    var arr = new Array(pic1, pic2, pic3, pic4);
    var num = 0;

    function slides() {
        if (num>=arr.length-1) {
            num = 0;
            arr[arr.length-1].style.visibility="hidden";
            arr[num].style.visibility = "visible";
            Abar.value = 0;
        }
        else if (arr[num].style.visibility=="visible") {
            arr[num].style.visibility = "hidden";
            arr[num+1].style.visibility = "visible";
            num++; 
            Abar.value++;
        }
        else {
            arr[num].style.visibility = "visible";
            arr[num+1].style.visibility = "hidden";
            num++; 
            Abar.value++;
        }   
    }
    function slides_back() {
        if (num<=0) {
            num = arr.length-1;
            arr[0].style.visibility="hidden";
            arr[num].style.visibility = "visible";
            Abar.value = arr.length;
        }
        else if (arr[num].style.visibility=="visible") {
            arr[num].style.visibility = "hidden";
            arr[num-1].style.visibility = "visible";
            num--; 
            Abar.value--;
        }
        else {
            arr[num].style.visibility = "visible";
            arr[num+1].style.visibility = "hidden";
            num--; 
            Abar.value--;
        }   
    }
    canvas.onclick=slides;
    canvas2.onclick=slides_back;
    </script>
